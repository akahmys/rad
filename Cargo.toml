[package]
name = "rad"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
jsonc-parser = { version = "0.26", features = ["serde"] }
dirs = "5.0"
clap = { version = "4.4", features = ["derive"] }
nix = { version = "0.29", features = ["process", "signal"] }
